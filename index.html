<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026赛季积分排行榜</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e1a;
      color: #e8eaf6;
      font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    /* ===== HEADER ===== */
    .page-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .page-header h1 {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .page-header p {
      color: #7986cb;
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .main-wrap {
      display: flex;
      gap: 28px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard {
      flex: 1;
      min-width: 300px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7986cb;
      margin-bottom: 12px;
    }

    .board-list {
      list-style: none;
    }
    .board-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #141929;
      border: 1px solid #1e2740;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .board-item:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    /* Top 3 special styles */
    .board-item.rank-1 { background: linear-gradient(135deg, #1a1400, #2a2000); border-color: #ffd700; }
    .board-item.rank-2 { background: linear-gradient(135deg, #141414, #1e1e1e); border-color: #c0c0c0; }
    .board-item.rank-3 { background: linear-gradient(135deg, #1a0e00, #281800); border-color: #cd7f32; }

    .rank-num {
      font-size: 18px;
      font-weight: 900;
      min-width: 32px;
      text-align: center;
    }
    .rank-1 .rank-num { color: #ffd700; font-size: 22px; }
    .rank-2 .rank-num { color: #c0c0c0; font-size: 20px; }
    .rank-3 .rank-num { color: #cd7f32; font-size: 20px; }
    .rank-num.others { color: #546e7a; }

    .rank-medal {
      font-size: 24px;
      min-width: 28px;
      text-align: center;
    }

    .rank-info {
      flex: 1;
    }
    .rank-name {
      font-size: 16px;
      font-weight: 700;
      color: #e8eaf6;
    }
    .rank-1 .rank-name { color: #ffd700; }
    .rank-2 .rank-name { color: #e0e0e0; }
    .rank-3 .rank-name { color: #cd7f32; }

    .rank-bar-wrap {
      height: 4px;
      background: #1e2740;
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .rank-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #3f51b5, #7986cb);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rank-1 .rank-bar { background: linear-gradient(90deg, #ff8c00, #ffd700); }
    .rank-2 .rank-bar { background: linear-gradient(90deg, #9e9e9e, #e0e0e0); }
    .rank-3 .rank-bar { background: linear-gradient(90deg, #a0522d, #cd7f32); }

    .rank-score {
      font-size: 22px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: #7986cb;
      text-align: right;
      min-width: 70px;
    }
    .rank-1 .rank-score { color: #ffd700; }
    .rank-2 .rank-score { color: #c0c0c0; }
    .rank-3 .rank-score { color: #cd7f32; }

    .board-empty {
      text-align: center;
      color: #546e7a;
      padding: 40px 0;
      font-size: 14px;
    }

    /* ===== REGISTER PANEL ===== */
    .register-panel {
      width: 280px;
      flex-shrink: 0;
    }
    .register-card {
      background: #141929;
      border: 1px solid #1e2740;
      border-radius: 16px;
      padding: 24px;
    }
    .register-card h2 {
      font-size: 16px;
      font-weight: 700;
      color: #e8eaf6;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
      position: relative;
    }
    .form-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #546e7a;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      background: #0a0e1a;
      border: 1px solid #2a3a5a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8eaf6;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: #5c6bc0;
      box-shadow: 0 0 0 3px rgba(92,107,192,0.2);
    }
    .form-input::placeholder { color: #37474f; }
    .form-input[type="password"] { letter-spacing: 4px; }
    .form-input[type="password"]::placeholder { letter-spacing: 0; }

    /* Autocomplete dropdown */
    .autocomplete-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #1a2235;
      border: 1px solid #2a3a5a;
      border-top: none;
      border-radius: 0 0 8px 8px;
      z-index: 100;
      max-height: 160px;
      overflow-y: auto;
      display: none;
    }
    .autocomplete-list.show { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }
    .autocomplete-item:hover, .autocomplete-item.active {
      background: #2a3a5a;
    }
    .autocomplete-item .item-score {
      font-size: 12px;
      color: #7986cb;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3f51b5, #5c6bc0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(63,81,181,0.4);
    }
    .btn-submit:active { transform: translateY(0); }

    .btn-reset {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: #ef5350;
      border: 1px solid #ef5350;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
      margin-top: 12px;
    }
    .btn-reset:hover {
      background: rgba(239,83,80,0.1);
    }

    /* Reset confirm dialog overlay */
    .reset-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .reset-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .reset-dialog {
      background: #141929;
      border: 1px solid #2a3a5a;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .reset-dialog .warn-icon { font-size: 40px; margin-bottom: 12px; }
    .reset-dialog h3 { font-size: 18px; color: #ef5350; margin-bottom: 8px; }
    .reset-dialog p { font-size: 13px; color: #7986cb; margin-bottom: 20px; line-height: 1.5; }
    .reset-dialog .form-input { text-align: center; margin-bottom: 16px; }
    .reset-dialog .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .btn-cancel {
      padding: 10px 24px;
      background: transparent;
      color: #546e7a;
      border: 1px solid #2a3a5a;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel:hover { background: #1e2740; }
    .btn-danger {
      padding: 10px 24px;
      background: #ef5350;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-danger:hover { opacity: 0.85; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e2740;
      color: #e8eaf6;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #2a3a5a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-color: #4caf50; color: #81c784; }
    .toast.error   { border-color: #ef5350; color: #ef9a9a; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat-item {
      background: #141929;
      border: 1px solid #1e2740;
      border-radius: 10px;
      padding: 10px 18px;
      flex: 1;
      min-width: 80px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 900;
      color: #7986cb;
    }
    .stat-label {
      font-size: 11px;
      color: #546e7a;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* New entry flash */
    @keyframes flash-new {
      0%   { background: rgba(92,107,192,0.3); }
      100% { background: transparent; }
    }
    .board-item.new-entry {
      animation: flash-new 1.2s ease-out forwards;
    }

    @media (max-width: 680px) {
      .main-wrap { flex-direction: column-reverse; }
      .register-panel { width: 100%; }
      .leaderboard { min-width: unset; width: 100%; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>🏆 2026赛季积分排行榜</h1>
  <p>TOP 20 · 实时更新</p>
</div>

<div class="main-wrap">

  <!-- ===== LEADERBOARD ===== -->
  <section class="leaderboard">
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <div class="stat-value" id="statPlayers">0</div>
        <div class="stat-label">参与人数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">总积分</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statTop">—</div>
        <div class="stat-label">最高积分</div>
      </div>
    </div>

    <div class="section-title">排名 / RANKING</div>
    <ul class="board-list" id="boardList">
      <li class="board-empty">暂无数据，快来登记第一个积分！</li>
    </ul>
  </section>

  <!-- ===== REGISTER PANEL ===== -->
  <aside class="register-panel">
    <div class="register-card">
      <h2>✏️ 登记积分</h2>

      <div class="form-group">
        <label class="form-label" for="inputName">昵称</label>
        <input class="form-input" id="inputName" type="text"
               placeholder="输入昵称" autocomplete="off" />
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="inputScore">积分</label>
        <input class="form-input" id="inputScore" type="number"
               placeholder="输入本次积分" min="1" />
      </div>

      <div class="form-group">
        <label class="form-label" for="inputCode">确认码</label>
        <input class="form-input" id="inputCode" type="password"
               placeholder="请输入确认码" maxlength="10" />
      </div>

      <button class="btn-submit" id="btnSubmit">确认登记</button>
      <button class="btn-reset" id="btnReset">⚠ 积分清零</button>
    </div>
  </aside>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Reset confirm dialog -->
<div class="reset-overlay" id="resetOverlay">
  <div class="reset-dialog">
    <div class="warn-icon">⚠️</div>
    <h3>确认清零所有积分？</h3>
    <p>此操作将删除全部排行榜数据，<br>不可恢复。请输入确认码后继续。</p>
    <input class="form-input" id="inputResetCode" type="password"
           placeholder="请输入确认码" maxlength="10" autocomplete="off" />
    <div class="btn-row">
      <button class="btn-cancel" id="btnCancelReset">取消</button>
      <button class="btn-danger" id="btnConfirmReset">确认清零</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
  import { getDatabase, ref, get, set, remove, update, onValue, off } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA0pI0w6u-tpMPV67UDA1imrfA5dQUl4d0",
    authDomain: "scoreboard-aad7b.firebaseapp.com",
    databaseURL: "https://scoreboard-aad7b-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "scoreboard-aad7b",
    storageBucket: "scoreboard-aad7b.firebasestorage.app",
    messagingSenderId: "188366839546",
    appId: "1:188366839546:web:b7715edef796ff9dfaf343"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ===== Data =====
  const CONFIRM_CODE = '000888';
  const MAX_RANK = 20;

  let scores = {};      // { nickname: totalScore }
  let submitting = false;

  // Firebase key encoding (keys can't contain . # $ [ ])
  function encodeKey(name) { return encodeURIComponent(name); }
  function decodeKey(key) { return decodeURIComponent(key); }

  // ===== Render =====
  const medals = ['🥇', '🥈', '🥉'];

  function getSorted() {
    return Object.entries(scores)
      .sort((a, b) => b[1] - a[1])
      .slice(0, MAX_RANK);
  }

  function formatScore(n) {
    if (n >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + 'W';
    return n.toLocaleString();
  }

  function renderBoard(highlightName) {
    const list = document.getElementById('boardList');
    const sorted = getSorted();

    if (sorted.length === 0) {
      list.innerHTML = '<li class="board-empty">暂无数据，快来登记第一个积分！</li>';
      renderStats(sorted);
      return;
    }

    const maxScore = sorted[0][1];

    list.innerHTML = sorted.map(([name, score], i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : '';
      const barWidth = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
      const isNew = name === highlightName ? ' new-entry' : '';

      return `
        <li class="board-item ${rankClass}${isNew}" data-name="${escHtml(name)}">
          ${rank <= 3
            ? `<span class="rank-medal">${medals[i]}</span>`
            : `<span class="rank-num others">${rank}</span>`}
          <div class="rank-info">
            <div class="rank-name">${escHtml(name)}</div>
            <div class="rank-bar-wrap">
              <div class="rank-bar" style="width:${barWidth}%"></div>
            </div>
          </div>
          <div class="rank-score">${formatScore(score)}</div>
        </li>`;
    }).join('');

    renderStats(sorted);
  }

  function renderStats(sorted) {
    const allEntries = Object.entries(scores);
    const total = allEntries.reduce((s, [, v]) => s + v, 0);
    document.getElementById('statPlayers').textContent = allEntries.length;
    document.getElementById('statTotal').textContent = formatScore(total);
    document.getElementById('statTop').textContent = sorted.length > 0 ? formatScore(sorted[0][1]) : '—';
  }

  // ===== Firebase operations =====
  async function fetchScores() {
    try {
      const snap = await get(ref(db, 'scores'));
      return snap.exists() ? snap.val() : {};
    } catch (e) {
      console.error('Firebase read error:', e);
      return {};
    }
  }

  async function saveScore(name, newTotal) {
    await set(ref(db, 'scores/' + encodeKey(name)), newTotal);
  }

  function listenScores() {
    onValue(ref(db, 'scores'), (snap) => {
      scores = snap.exists() ? snap.val() : {};
      renderBoard();
    });
  }

  // ===== Submit =====
  document.getElementById('btnSubmit').addEventListener('click', async () => {
    if (submitting) return;
    const name  = document.getElementById('inputName').value.trim();
    const score = parseInt(document.getElementById('inputScore').value.trim(), 10);
    const code  = document.getElementById('inputCode').value.trim();

    if (!name)            return showToast('请输入昵称', 'error');
    if (!score || score <= 0) return showToast('积分需大于 0', 'error');
    if (code !== CONFIRM_CODE) return showToast('确认码错误', 'error');

    submitting = true;
    document.getElementById('btnSubmit').textContent = '提交中...';

    try {
      const isNew = !(name in scores);
      const newTotal = (scores[name] || 0) + score;
      await saveScore(name, newTotal);

      document.getElementById('inputName').value  = '';
      document.getElementById('inputScore').value = '';
      document.getElementById('inputCode').value  = '';
      hideAutocomplete();

      showToast(isNew
        ? `🎉 ${name} 登记成功，积分 ${formatScore(score)}！`
        : `✅ ${name} 积分 +${formatScore(score)}，累计 ${formatScore(newTotal)}`, 'success');
    } catch (e) {
      showToast('提交失败，请检查网络', 'error');
    } finally {
      submitting = false;
      document.getElementById('btnSubmit').textContent = '确认登记';
    }
  });

  // ===== Autocomplete =====
  const inputName = document.getElementById('inputName');
  const acList    = document.getElementById('autocompleteList');
  let acActive = -1;

  inputName.addEventListener('input', () => {
    const q = inputName.value.trim().toLowerCase();
    acActive = -1;
    if (!q) { hideAutocomplete(); return; }

    const matches = Object.entries(scores)
      .filter(([n]) => n.toLowerCase().includes(q))
      .sort((a, b) => b[1] - a[1])
      .slice(0, 8);

    if (matches.length === 0) { hideAutocomplete(); return; }

    acList.innerHTML = matches.map(([n, s], i) =>
      `<div class="autocomplete-item" data-index="${i}" data-name="${escAttr(n)}">
        <span>${escHtml(n)}</span>
        <span class="item-score">已有 ${formatScore(s)} 分</span>
      </div>`
    ).join('');

    acList.querySelectorAll('.autocomplete-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        inputName.value = el.dataset.name;
        hideAutocomplete();
      });
    });

    acList.classList.add('show');
  });

  inputName.addEventListener('keydown', e => {
    const items = acList.querySelectorAll('.autocomplete-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acActive = Math.min(acActive + 1, items.length - 1);
      updateAcActive(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acActive = Math.max(acActive - 1, -1);
      updateAcActive(items);
    } else if (e.key === 'Enter' && acActive >= 0) {
      e.preventDefault();
      inputName.value = items[acActive].dataset.name;
      hideAutocomplete();
    } else if (e.key === 'Escape') {
      hideAutocomplete();
    }
  });

  function updateAcActive(items) {
    items.forEach((el, i) => el.classList.toggle('active', i === acActive));
  }

  inputName.addEventListener('blur', () => setTimeout(hideAutocomplete, 150));

  function hideAutocomplete() {
    acList.classList.remove('show');
    acList.innerHTML = '';
    acActive = -1;
  }

  // ===== Toast =====
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (type ? ' ' + type : '');
    requestAnimationFrame(() => { t.classList.add('show'); });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ===== Reset =====
  const resetOverlay   = document.getElementById('resetOverlay');
  const inputResetCode = document.getElementById('inputResetCode');

  document.getElementById('btnReset').addEventListener('click', () => {
    inputResetCode.value = '';
    resetOverlay.classList.add('show');
    setTimeout(() => inputResetCode.focus(), 150);
  });

  document.getElementById('btnCancelReset').addEventListener('click', () => {
    resetOverlay.classList.remove('show');
  });

  resetOverlay.addEventListener('click', e => {
    if (e.target === resetOverlay) resetOverlay.classList.remove('show');
  });

  document.getElementById('btnConfirmReset').addEventListener('click', async () => {
    const code = inputResetCode.value.trim();
    if (code !== CONFIRM_CODE) {
      showToast('确认码错误，清零取消', 'error');
      resetOverlay.classList.remove('show');
      return;
    }
    try {
      await remove(ref(db, 'scores'));
      scores = {};
      renderBoard();
      resetOverlay.classList.remove('show');
      showToast('所有积分已清零', 'success');
    } catch (e) {
      showToast('清零失败，请检查网络', 'error');
      resetOverlay.classList.remove('show');
    }
  });

  inputResetCode.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnConfirmReset').click();
    if (e.key === 'Escape') resetOverlay.classList.remove('show');
  });

  // ===== Helpers =====
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return str.replace(/"/g, '&quot;');
  }

  // ===== Init =====
  // Load initial data, then start real-time listener
  (async () => {
    try {
      scores = await fetchScores();
      renderBoard();
    } catch (e) {
      console.error('Init error:', e);
      renderBoard();
    }
    // Real-time listener: any device's change is pushed to all connected clients
    listenScores();
  })();
</script>
</body>
</html>
